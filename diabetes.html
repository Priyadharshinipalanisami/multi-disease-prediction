```html
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Diabetes Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>

        body {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }


        .container-box {

            background: white;
            margin-top: 50px;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);

        }


        h2 {

            text-align: center;
            color: #11998e;
            font-weight: bold;
            margin-bottom: 30px;

        }


        .form-control {

            border-radius: 15px;
            padding: 12px;

        }


        label {

            font-weight: bold;

        }


        .btn-predict {

            width: 100%;
            border-radius: 25px;
            padding: 12px;
            font-size: 18px;

        }


        .back-btn {

            margin-top: 15px;
            width: 100%;
            border-radius: 25px;

        }


    </style>


</head>


<body>


<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-8">


            <div class="container-box">


                <h2>
                    🩸 Diabetes Prediction
                </h2>



                <form action="{{ url_for('diabetes') }}" method="POST">



                    <div class="row">


                        <div class="col-md-6 mb-3">

                            <label>
                                Pregnancies
                            </label>

                            <input type="number"
                                   name="pregnancies"
                                   class="form-control"
                                   placeholder="Enter number of pregnancies"
                                   required>

                        </div>



                        <div class="col-md-6 mb-3">

                            <label>
                                Glucose Level
                            </label>

                            <input type="number"
                                   name="glucose"
                                   class="form-control"
                                   placeholder="Enter glucose value"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>
                                Blood Pressure
                            </label>

                            <input type="number"
                                   name="bloodpressure"
                                   class="form-control"
                                   placeholder="Enter blood pressure"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>
                                Skin Thickness
                            </label>

                            <input type="number"
                                   name="skinthickness"
                                   class="form-control"
                                   placeholder="Enter skin thickness"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>
                                Insulin
                            </label>

                            <input type="number"
                                   name="insulin"
                                   class="form-control"
                                   placeholder="Enter insulin level"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>
                                BMI
                            </label>

                            <input type="number"
                                   step="0.01"
                                   name="bmi"
                                   class="form-control"
                                   placeholder="Enter BMI"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>
                                Diabetes Pedigree Function
                            </label>

                            <input type="number"
                                   step="0.001"
                                   name="dpf"
                                   class="form-control"
                                   placeholder="Enter diabetes pedigree value"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>
                                Age
                            </label>

                            <input type="number"
                                   name="age"
                                   class="form-control"
                                   placeholder="Enter age"
                                   required>

                        </div>


                    </div>



                    <button type="submit"
                            class="btn btn-success btn-predict">

                        🔍 Predict Diabetes

                    </button>


                </form>



                <a href="{{ url_for('dashboard') }}"
                   class="btn btn-secondary back-btn">

                    ⬅ Back to Dashboard

                </a>



            </div>


        </div>


    </div>


</div>



</body>

</html>
```
