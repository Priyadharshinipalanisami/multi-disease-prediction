```html
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Heart Disease Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>

        body {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }


        .container-box {

            background: white;
            margin-top: 40px;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.25);

        }


        h2 {

            text-align: center;
            color: #ff416c;
            font-weight: bold;
            margin-bottom: 30px;

        }


        .form-control {

            border-radius: 15px;
            padding: 12px;

        }


        label {

            font-weight: bold;

        }


        .btn-predict {

            width:100%;
            border-radius:25px;
            padding:12px;
            font-size:18px;

        }


        .back-btn {

            margin-top:15px;
            width:100%;
            border-radius:25px;

        }


    </style>


</head>


<body>


<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-10">


            <div class="container-box">


                <h2>
                    ❤️ Heart Disease Prediction
                </h2>



                <form action="{{ url_for('heart') }}" method="POST">


                    <div class="row">



                        <div class="col-md-6 mb-3">

                            <label>Age</label>

                            <input type="number"
                                   name="age"
                                   class="form-control"
                                   placeholder="Enter age"
                                   required>

                        </div>



                        <div class="col-md-6 mb-3">

                            <label>Sex</label>

                            <select name="sex" class="form-control" required>

                                <option value="">Select</option>
                                <option value="1">Male</option>
                                <option value="0">Female</option>

                            </select>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>Chest Pain Type</label>

                            <input type="number"
                                   name="cp"
                                   class="form-control"
                                   placeholder="0 - 3"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>Resting Blood Pressure</label>

                            <input type="number"
                                   name="trestbps"
                                   class="form-control"
                                   placeholder="Blood pressure"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>Cholesterol</label>

                            <input type="number"
                                   name="chol"
                                   class="form-control"
                                   placeholder="Cholesterol level"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>Fasting Blood Sugar</label>

                            <input type="number"
                                   name="fbs"
                                   class="form-control"
                                   placeholder="0 or 1"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>Resting ECG</label>

                            <input type="number"
                                   name="restecg"
                                   class="form-control"
                                   placeholder="0 - 2"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>Maximum Heart Rate</label>

                            <input type="number"
                                   name="thalach"
                                   class="form-control"
                                   placeholder="Maximum heart rate"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>Exercise Induced Angina</label>

                            <input type="number"
                                   name="exang"
                                   class="form-control"
                                   placeholder="0 or 1"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>ST Depression</label>

                            <input type="number"
                                   step="0.01"
                                   name="oldpeak"
                                   class="form-control"
                                   placeholder="ST depression value"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>Slope</label>

                            <input type="number"
                                   name="slope"
                                   class="form-control"
                                   placeholder="0 - 2"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>Major Vessels (CA)</label>

                            <input type="number"
                                   name="ca"
                                   class="form-control"
                                   placeholder="0 - 4"
                                   required>

                        </div>




                        <div class="col-md-6 mb-3">

                            <label>Thal</label>

                            <input type="number"
                                   name="thal"
                                   class="form-control"
                                   placeholder="1 - 3"
                                   required>

                        </div>


                    </div>




                    <button type="submit"
                            class="btn btn-danger btn-predict">

                        ❤️ Predict Heart Disease

                    </button>



                </form>




                <a href="{{ url_for('dashboard') }}"
                   class="btn btn-secondary back-btn">

                    ⬅ Back to Dashboard

                </a>



            </div>


        </div>


    </div>


</div>



</body>

</html>
```
